app:
  api-prefix: /ecommerce/v1
server:
  port: 8888

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=${app.api-prefix}/order/**

            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=${app.api-prefix}/product/**

            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=${app.api-prefix}/notification/**

            - id: promotion-service
              uri: lb://promotion-service
              predicates:
                - Path=${app.api-prefix}/promotion/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/order-tracking
          jwk-set-uri: http://localhost:8080/realms/order-tracking/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/